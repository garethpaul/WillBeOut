<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN">
<html>
	<head>
		<meta name="viewport" content="width=device-width,minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />  
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<link rel="stylesheet" href="/static/css/style.css" type="text/css">
		<link rel="stylesheet" href="https://code.jquery.com/mobile/1.1.1/jquery.mobile-1.1.1.min.css" type="text/css" integrity="sha384-31ymrrslLx0ofx2q0EHCjIS4EP7kb0vHWi50Seb913TPXArCPyCsfuH5FnNkFWt3" crossorigin="anonymous">
		<link rel="stylesheet" href="/static/css/mobile.css" type="text/css">
		<script src="https://code.jquery.com/jquery-1.7.1.min.js" type="text/javascript" integrity="sha384-npxfGiG5C/F5X72RqcKFYSfzr1AXsDiu1YC/ydsOrS+jL554Jh4zFAx9GpQi4lXQ" crossorigin="anonymous">
</script>
		<script src="https://code.jquery.com/mobile/1.1.1/jquery.mobile-1.1.1.min.js" type="text/javascript" integrity="sha384-t8aBsXwe6RT0fl56nhrEIGVQMFx4cLjxUzir5ez5nuk4WoLAk1Lov2O3H+jGrT+Y" crossorigin="anonymous">
</script>
<script type='text/javascript'>
function getCookie(name) {
    var r = document.cookie.match("\\b" + name + "=([^;]*)\\b");
    return r ? r[1] : undefined;
}
</script>
		<style type="text/css">
.ui-header.ui-bar-a{
			background:black;
			min-height:90px;
		}
		.msglist{
			margin-top:10px;
			margin-bottom:10px;
		}
		.main{
			font-family: 'helvetica neue', helvetica, arial, sans-serif;
			font-size: 20px;
			font-weight: 100;
			color:white;
			float:left;
			margin-top:30px;
		}
		.wrap img{float:left}
		.wrap{
			text-align:center;
			width:300px;
			margin:0 auto;
		}
		.ui-bar{
			text-align:center;
		}
		.back{
			max-width:100px;
			float:left;
		}
		.limob{
			height:50px;
		}
		.btn-mobile{
			border-radius:20px;
			width:100px;
			background:#CCC;
			font-size:12px;
			font-weight:600;
			margin-bottom:5px;
		}
		</style>
		<script type='text/javascript'>
		$(document).ready(function(){
			// SPINNER START
			$('.msglist').text('Loading');
			$.getJSON('/messages?event_id={{ event['id'] }}', function(data) {
				$('.msglist').empty();
			  	$.each(data, function(key, val) {
					var item = $('<li>').attr('id', val.id);
					if ( val.user_id == {{ current_user['id'] }} ){
						item.addClass('admin');
					}
					$('<img>')
						.addClass('left')
						.attr('src', 'https://graph.facebook.com/' + encodeURIComponent(val.user_id) + '/picture?type=small')
						.appendTo(item);
					$('<span>').addClass('msg').text(val.msg).appendTo(item);
					$('<span>').addClass('date right').text(val.d).appendTo(item);
					$('<div>').addClass('clear').appendTo(item);
					$('.msglist').append(item);
				});
			});
		})

		    </script>

		<title></title>
	</head>
	<body>
		<div data-role="page" id='event'>  
		  <div data-role="header">
			<div data-role="controlgroup" data-type="horizontal">
			<a onclick='javascript:history.go(-1)' data-role="button" data-icon="back">Back</a>
			<!--<a href="index.html" data-role="button" data-icon="plus">aybe</a>-->
			<div class='wrap'>
			<img src='/static/img/og.png'><span class='main'>WillBeOut</span>
			</div>
			</div>
		  </div>
		<div data-role="content" id="contentTransition" name="contentTransition">

			<div class="content-primary">
			<h2>Event: {{ event['place'] }} [{{ event['f'] }}]</h2>
			<a data-role='button' style='max-width:200px;' rel='external' href='#newmessage'>Add Message</a>
			<div data-role="collapsible">
				<h3>Places</h3>
				<ul data-role="listview">
					{% for i in places %}
					<li>{{ i['name'] }} -  <span class='right'>{{ i['friends'] }} friends wants to go here</span></li>
					{% end %}
				</ul>
			</div>
			<div data-role="collapsible">
			<h3>Messages</h3>
			<ul style='margin-top:10px' class='msglist' data-role="listview">
			</ul>
			</div>
			</div>
			
		 </div> 
		<div data-role="footer" class='ui-bar'>
			<div data-role="controlgroup" data-type="horizontal">
			<a href="/mobile/events" rel='external' data-role="button" data-icon="plus">Home</a>
			<!--<a href="index.html" data-role="button" data-icon="plus">aybe</a>-->
			</div>
		</div>
		</div>
		
		<div data-role="page" id='newmessage'>  
		  <div data-role="header">
			<div data-role="controlgroup" data-type="horizontal">
			<a onclick='javascript:history.go(-1)' data-role="button" data-icon="back">Back</a>
			<!--<a href="index.html" data-role="button" data-icon="plus">aybe</a>-->
			<div class='wrap'>
			<img src='/static/img/og.png'><span class='main'>WillBeOut</span>
			</div>
			</div>
		  </div>
		<div data-role="content" id="contentTransition" name="contentTransition">
			<div class="content-primary">
			<h2>Event: {{ event['place'] }}</h2>
			<form data-rel='external' id='newform'>
			{% module xsrf_form_html() %}
			<label>Add Message</label>
			<textarea name='msg' rows="9"></textarea>
			<input type='hidden' name='type' value='message' />
			<input type='hidden' name='id' value='{{ event['id'] }}' />
			<input type='submit' value='Submit Message'/>
			</div>
		 </div> 
		<div data-role="footer" class='ui-bar'>
			<div data-role="controlgroup" data-type="horizontal">
			<a href="/mobile/events" rel='external' data-role="button" data-icon="plus">Home</a>
			<!--<a href="index.html" data-role="button" data-icon="plus">aybe</a>-->
			</div>
		</div>
		</div>
		<script type='text/javascript'>
		$('form#newform').submit(function(e) {
		   e.preventDefault();
		   $.post('/messages', {'msg': $('textarea[name="msg"]').val(), 
					'type': $('input[name="type"]').val(),
					'id': $('input[name="id"]').val(),
					'_xsrf': getCookie('_xsrf')}, function(){
						window.location.href = '/mobile/event?id={{event['id']}}';
					});
		});
		</script>
	</body>
</html>
